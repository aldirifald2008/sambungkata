<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2800/2800015.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordFinder Ultra Pro | Multi-Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --danger: #ff4b2b;
            --success: #00ff88;
            --glass: rgba(15, 23, 42, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            background: #020617;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            overscroll-behavior: none;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(240, 147, 251, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(15, 23, 42, 1) 0px, transparent 100%);
        }

        .container {
            width: 95%;
            max-width: 500px;
            height: 96vh;
            margin: 2vh auto;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; margin-bottom: 15px; flex-shrink: 0; }
        h1 { font-weight: 800; font-size: 2.2rem; margin: 0; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .status-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.03); padding: 4px 12px; border-radius: 100px; font-size: 11px; border: 1px solid var(--border); margin-top: 8px; }
        .loading-dot { height: 6px; width: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .search-area { position: relative; margin-bottom: 12px; flex-shrink: 0; }
        input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--border);
            border-radius: 18px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        .list-container {
            flex: 1;
            overflow-y: auto;
            border-radius: 18px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            padding: 10px;
            margin-bottom: 12px;
            touch-action: pan-y;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 12px 15px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }
        li:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }
        .word-text { font-weight: 600; font-size: 1rem; color: #fff; }
        .word-len { font-size: 9px; color: var(--accent); font-weight: 800; border: 1px solid var(--accent); padding: 1px 5px; border-radius: 4px; }

        .virtual-keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            flex-shrink: 0;
        }

        .key-btn {
            padding: 12px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .key-btn:active { background: var(--primary); color: #000; transform: scale(0.9); }
        .key-btn.special { background: rgba(240, 147, 251, 0.2); color: var(--accent); }
        .key-btn.danger { background: rgba(255, 75, 43, 0.2); color: #ff4b2b; grid-column: span 2; }

        .stats-row { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 8px; padding: 0 5px; }
        .footer { font-size: 9px; text-align: center; margin-top: 10px; opacity: 0.3; letter-spacing: 1px; }

        /* Media Query Khusus Layar Popup (Pendek) */
        @media (max-height: 550px) {
            .container { padding: 12px; height: 98vh; margin: 1vh auto; }
            h1 { font-size: 1.4rem; }
            .status-badge, .footer, .stats-row { display: none !important; }
            .search-area { margin-bottom: 8px; }
            input { padding: 10px 10px 10px 40px; font-size: 14px; }
            .key-btn { padding: 8px 0; font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="container">
    <header>
        <h1>WordFinder<span style="font-weight: 300; opacity: 0.7;">PRO</span></h1>
        <div id="status" class="status-badge">
            <span class="loading-dot"></span>
            Menghubungkan...
        </div>
    </header>

    <div class="search-area">
        <span class="search-icon">🔍</span>
        <input id="pola" placeholder="Ketik pola..." autocomplete="off" inputmode="none">
    </div>

    <div class="stats-row">
        <div id="counter-text">Siap mencari...</div>
        <div id="timer">0ms</div>
    </div>

    <div class="list-container" id="scrollWin">
        <ul id="hasil">
            <div style="text-align: center; padding: 40px 10px; opacity: 0.5; font-size: 13px;">
                Gunakan <b>_</b> (1 huruf) atau <b>=</b> (banyak huruf)
            </div>
        </ul>
    </div>

    <div class="virtual-keyboard" id="keyboard"></div>
    <div class="footer">ULTRA-FAST SEARCH ENGINE</div>
</div>

<script>
    let masterKamus = [];
    let filtrasi = [];
    let displayCount = 40;

    const inputPola = document.getElementById("pola");
    const keyboard = document.getElementById("keyboard");

    async function loadDatabase() {
        const status = document.getElementById("status");
        const files = ["kamus.txt", "kamus1.txt", "kamus2.txt", "kamus3.txt", "kamus4.txt", "kamus5.txt"];
        let rawContent = "";

        for (let file of files) {
            try {
                const res = await fetch(file);
                if (res.ok) rawContent += " " + await res.text();
            } catch (e) {}
        }

        masterKamus = [...new Set(
            rawContent.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, " ")
            .toLowerCase().split(/\s+/)
        )].filter(w => w.length > 1).sort();

        status.innerHTML = `<span class="loading-dot" style="background:#00ff88"></span> ${masterKamus.length.toLocaleString()} Kata Aktif`;
    }

    function render(append = false) {
        const ul = document.getElementById("hasil");
        if (!append) { ul.innerHTML = ""; displayCount = 40; }
        const limit = Math.min(displayCount, filtrasi.length);
        const start = append ? displayCount - 40 : 0;
        
        const fragment = document.createDocumentFragment();
        for (let i = start; i < limit; i++) {
            const li = document.createElement("li");
            li.innerHTML = `<span class="word-text">${filtrasi[i]}</span><span class="word-len">${filtrasi[i].length}L</span>`;
            li.onclick = () => {
                navigator.clipboard.writeText(filtrasi[i]);
                vibrateDevice(50);
            };
            fragment.appendChild(li);
        }
        ul.appendChild(fragment);
    }

    function search() {
        const val = inputPola.value.trim().toLowerCase();
        const t0 = performance.now();
        if (!val) { filtrasi = []; render(); return; }

        try {
            let pattern = val.replace(/_/g, "[a-z]").replace(/=/g, ".*");
            let regex = (val.includes("_") || val.includes("=")) ? new RegExp(`^${pattern}$`, "i") : new RegExp(pattern, "i");
            filtrasi = masterKamus.filter(k => regex.test(k));
            document.getElementById("timer").innerText = `${Math.round(performance.now() - t0)}ms`;
            document.getElementById("counter-text").innerHTML = `<b>${filtrasi.length}</b> hasil`;
            render();
        } catch (e) {}
    }

    // Keyboard Logic
    const keys = [...'abcdefghijklmnopqrstuvwxyz'.split(''), {l:'_',v:'_'}, {l:'=',v:'='}, {l:'⌫',v:'DEL'}];
    keys.forEach(k => {
        const btn = document.createElement('button');
        const isObj = typeof k === 'object';
        btn.className = `key-btn ${isObj ? (k.v === 'DEL' ? 'danger' : 'special') : ''}`;
        btn.innerText = isObj ? k.l : k;
        btn.onclick = () => {
            const val = isObj ? k.v : k;
            if (val === 'DEL') inputPola.value = inputPola.value.slice(0, -1);
            else inputPola.value += val;
            vibrateDevice(15);
            search();
        };
        keyboard.appendChild(btn);
    });

    function vibrateDevice(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    document.getElementById("scrollWin").onscroll = function() {
        if (this.scrollTop + this.clientHeight >= this.scrollHeight - 20 && displayCount < filtrasi.length) {
            displayCount += 40; render(true);
        }
    };

    loadDatabase();
</script>
</body>
</html>
